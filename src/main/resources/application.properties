spring.application.name=SchoolCRM

# Porta — Railway injeta PORT; padrão 8080 para dev local
server.port=${PORT:8080}

# Banco — padrão local (application-prod.properties sobrescreve no Railway)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT — em produção, defina JWT_SECRET como variável de ambiente (mínimo 32 chars)
jwt.secret=${JWT_SECRET:schoolcrm-dev-secret-local-apenas-nao-usar-em-producao}

# CORS — padrão cobre local e qualquer deploy Railway
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://*.up.railway.app}

# Sicoob API — Boletos híbridos (boleto + PIX)
# Em dev: enabled=false usa mock; em prod/sandbox: enabled=true usa API real
sicoob.api.enabled=${SICOOB_API_ENABLED:false}
sicoob.api.base-url=${SICOOB_API_BASE_URL:https://sandbox.sicoob.com.br/sicoob/sandbox/cobranca-bancaria/v3}
sicoob.api.client-id=${SICOOB_API_CLIENT_ID:}
sicoob.api.client-secret=${SICOOB_API_CLIENT_SECRET:}
sicoob.api.access-token=${SICOOB_API_ACCESS_TOKEN:}
sicoob.api.token-url=${SICOOB_API_TOKEN_URL:https://auth.sicoob.com.br/auth/realms/cooperado/protocol/openid-connect/token}
sicoob.api.numero-beneficiario=${SICOOB_NUMERO_BENEFICIARIO:}
sicoob.api.numero-contrato-cobranca=${SICOOB_NUMERO_CONTRATO_COBRANCA:}
sicoob.api.cooperativa=${SICOOB_COOPERATIVA:}
sicoob.api.conta-corrente=${SICOOB_CONTA_CORRENTE:}
sicoob.api.webhook-secret=${SICOOB_WEBHOOK_SECRET:}
