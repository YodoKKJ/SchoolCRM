# Use JDT (Eclipse) compiler instead of javac.
# JRJdtCompiler resolves classes via Thread.currentThread().getContextClassLoader(),
# which means it works correctly inside Spring Boot fat JARs where JasperReports
# classes live in nested JARs (javac cannot reach them via java.class.path).
net.sf.jasperreports.compiler.class=net.sf.jasperreports.engine.design.JRJdtCompiler
